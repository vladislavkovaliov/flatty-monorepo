name: Lint PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: react-launcher
            workspace: react-launcher
          - name: react-wrapper
            workspace: '@flatty-budget/react-wrapper'
          - name: react-resident
            workspace: '@flatty-budget/react-resident'
          - name: react-settings
            workspace: '@flatty-budget/react-settings'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint ${{ matrix.name }}
        run: npm run lint -w '${{ matrix.workspace }}'

  test:
    name: Test SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run SDK unit tests
        run: npm run test -w '@flatty-budget/sdk'

  test-go:
    name: Test Go API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/go-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/go-api/go.mod
          cache: true

      - name: Run Go API unit tests
        run: go test -race ./...
