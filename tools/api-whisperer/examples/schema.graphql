type User {
  id: Int!
  name: String!
  email: String!
  createdAt: DateTime!
}

"""
A date-time string at UTC, such as 2019-12-03T09:54:33Z, compliant with the date-time format.
"""
scalar DateTime

type PaginatedUsersResponse {
  items: [User!]!
  total: Int!
  hasMore: Boolean!
}

type CursorUserResponse {
  users: [User!]!
  nextCursor: Int!
}

type SearchResponse {
  items: [User!]!
  total: Int!
}

type UserWithTotalSpentResponse {
  id: Int!
  name: String!
  email: String!
  createdAt: DateTime!
  totalSpent: Float!
}

type DailyUserRegistrationResponse {
  createdAt: DateTime!
  count: Int!
}

type Order {
  id: Int!
  userId: Int!
  createdAt: DateTime!
}

type OrderItemResponse {
  productId: Int!
  title: String!
  quantity: Int!
  price: Float!
}

type DailyPurchasesResponse {
  orderDate: DateTime!
  purchases: Int!
}

type StatsOrderResponse {
  total: Int!
  totalThisMonth: Float!
  averageCheck: Float!
}

type GrowthResponse {
  value: Float!
  sign: String!
}

type OrdersTrendResponse {
  currentPeriod: Int!
  previousPeriod: Int!
  growth: GrowthResponse!
}

type PaginatedOrdersResponse {
  items: [Order!]!
  total: Int!
}

type DailyStatsResponse {
  date: DateTime!
  orders: Int!
  revenue: Float!
}

type PaginatedDailyStatsResponse {
  items: [DailyStatsResponse!]!
  total: Int!
}

type Query {
  users(limit: Int! = 10, offset: Int! = 0): PaginatedUsersResponse!
  usersCursor(cursor: Int! = 0, limit: Int! = 10): CursorUserResponse!
  usersCount: Int!
  searchUsers(field: String!, value: String!): SearchResponse!
  top3Users: [UserWithTotalSpentResponse!]!
  usersByMostExpensiveProduct: [User!]!
  dailyRegistrations: [DailyUserRegistrationResponse!]!
  orderCount: Int!
  ordersTrend: OrdersTrendResponse!
  orderStats: StatsOrderResponse!
  orders(limit: Int! = 10, offset: Int! = 0): PaginatedOrdersResponse!
  orderItems(orderId: Int!): [OrderItemResponse!]!
  dailyPurchases: [DailyPurchasesResponse!]!
  dailyStats(limit: Int! = 10, offset: Int! = 0): PaginatedDailyStatsResponse!
}