    - apartment
    - city
    - country
    - house
    - postal_code
    - street
    type: object
  dto.DeleteCategoryResponse:
    properties:
      data:
        example: 1
        type: integer
    required:
    - data
    type: object
  dto.DeleteExpenseResponse:
    properties:
      data:
        example: 1
        type: integer
    required:
    - data
