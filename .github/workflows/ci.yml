name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ">=20.19"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-${{ hashFiles('apps/go-api/go.sum', 'apps/go-api/go.mod') }}
          restore-keys: go-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx nx affected:lint

      - name: Test
        run: npx nx affected:test

      - name: Build
        run: npx nx affected:build
