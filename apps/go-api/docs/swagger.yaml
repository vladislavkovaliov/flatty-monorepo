info:
  contact: {}
  description: TBD
  title: GO API
  version: "1.0"
paths:
  /categories:
    get:
      description: Returns all categories from the database
      parameters:
      - description: Number of products to return (default 10)
        in: query
        name: limit
        type: integer
      - description: Number of products to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListCategoryResponse'
      summary: List all categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Add a new category to the database
      parameters:
      - description: Category data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CategoryResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a category
      tags:
      - categories
  /categories/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a category to the database
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.DeleteCategoryResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a category
      tags:
      - categories
    put:
      consumes:
      - application/json
      description: Update a category to the database
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Category data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CategoryResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a category
      tags:
      - categories
  /categories/count:
    get:
      description: Returns count categories from the database
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CountResponse'
      summary: Count all categories
      tags:
      - categories
  /expenses:
    get:
      description: Returns all expenses from the database
      parameters:
      - description: Number of items to return (default 10)
        in: query
        name: limit
        type: integer
      - description: Number of items to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListExpenseResponse'
      summary: List all expenses
      tags:
      - expenses
    post:
      consumes:
      - application/json
      description: Add a new expense to the database
      parameters:
      - description: Expense data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateExpenseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ExpenseResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create an expense
      tags:
      - expenses
  /expenses/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an expense from the database
      parameters:
      - description: Expense ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DeleteExpenseResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete an expense
      tags:
      - expenses
    put:
      consumes:
      - application/json
      description: Update an expense in the database
      parameters:
      - description: Expense ID
        in: path
        name: id
        required: true
        type: integer
      - description: Expense data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateExpenseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ExpenseResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update an expense
      tags:
      - expenses
  /expenses/count:
    get:
      description: Returns count of expenses from the database
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CountResponse'
      summary: Count all expenses
      tags:
      - expenses
  /expenses/stats/averages:
    get:
      description: Returns monthly expense averages, optionally filtered by month/year
      parameters:
      - description: Month (1-12)
        in: query
        name: month
        type: integer
      - description: Year (2000+)
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListMonthlyAverageResponse'
      summary: List monthly averages
      tags:
      - expense-stats
  /expenses/stats/totals:
    get:
      description: Returns monthly expense totals, optionally filtered by month/year
      parameters:
      - description: Month (1-12)
        in: query
        name: month
        type: integer
      - description: Year (2000+)
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListMonthlyTotalResponse'
      summary: List monthly totals
      tags:
      - expense-stats
  /health:
    get:
      description: Returns health check status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.HealthResponse'
      summary: Information about health status
      tags:
      - health
  /resident-location:
    get:
      description: Returns all resident location from the database
      parameters:
      - description: Number of products to return (default 10)
        in: query
        name: limit
        type: integer
      - description: Number of products to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListResidentLocationResponse'
      summary: List all resident location
      tags:
      - resident_location
    post:
      consumes:
      - application/json
      description: Add a new resident location to the database
      parameters:
      - description: Resident Location data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateResidentLocationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ResidentLocationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a resident location
      tags:
      - resident_location
  /resident-location/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a new resident location to the database
      parameters:
      - description: Resident Location ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.DeleteResidentLocationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a resident location
      tags:
      - resident_location
    put:
      consumes:
      - application/json
      description: Update a new resident location to the database
      parameters:
      - description: Resident Location ID
        in: path
        name: id
        required: true
        type: integer
      - description: Resident Location data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateResidentLocationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ResidentLocationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a resident location
      tags:
      - resident_location
  /resident-location/count:
    get:
      description: Returns count resident location from the database
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CountResponse'
      summary: Count all resident location
      tags:
      - resident_location
securityDefinitions:
  Bearer:
    description: Bearer token (better-auth session_token)
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
