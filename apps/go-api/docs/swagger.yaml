  dto.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    required:
    - status
    type: object
  dto.ListCategoryResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.CategoryResponse'
        type: array
      total:
        type: integer
    required:
    - data
    - total
    type: object
  dto.ListExpenseResponse:
    properties:
      data:
        items:
